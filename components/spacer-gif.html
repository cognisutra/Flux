    function render() {{
      var q = (document.querySelector('.searchInput').value || '').toLowerCase().trim();

      var filtered = cards.filter(function(c) {{
        var mf = activeFilter === 'all' || c.category === activeFilter;

        return mf && ms;
      }});
      var grid = document.getElementById('grid');

        html += '<div class="cat-tag">' + c.category + '</div>';
        html += '<div class="name">' + c.variant + '</div>';

      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(function(b) {{ b.classList.remove('active'); }});
      btn.classList.add('active');
      render();
    }});
    document.querySelector('.searchInput') && document.querySelector('.searchInput').addEventListener('input', render);
    render();
  </script>
</body>
</html>
