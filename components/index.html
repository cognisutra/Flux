<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Components — Flux</title>
  <link rel="stylesheet" href="../flux.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070a;
      color: #c8c8d0;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::selection { background: #7c3aed; color: #fff; }

    .noise {
      position: fixed; inset: 0; z-index: -1; opacity: 0.035; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    header {
      padding: 3rem 2rem 4rem;
      text-align: center;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    header .back {
      position: absolute;
      left: 2rem;
      top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #555;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    header .back:hover { color: #a78bfa; }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
    }

    header p {
      color: #555;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    .search-wrap {
      max-width: 600px;
      margin: 2rem auto 0;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.9rem 1.25rem 0.9rem 3rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: rgba(124,58,237,0.3);
    }

    .search-wrap input::placeholder { color: #444; }

    .search-wrap .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #444;
      font-size: 1.1rem;
      pointer-events: none;
    }

    .counter {
      text-align: center;
      font-size: 0.8rem;
      color: #444;
      margin: 1rem 0 0;
    }

    .counter span { color: #a78bfa; font-weight: 600; }

    .grid {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    .grid.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: #444;
      font-size: 0.95rem;
    }

    .comp-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 1.5rem 1.25rem;
      text-align: center;
      transition: all 0.3s;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .comp-card:hover {
      border-color: rgba(124,58,237,0.15);
      transform: translateY(-2px);
    }

    .comp-card .preview-box {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      margin: 0 auto 1rem;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
    }

    .comp-card .name {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .comp-card .tagline {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.03em;
    }

    .box-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .box-pink { background: linear-gradient(135deg, #ec4899, #f472b6); }
    .box-orange { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .box-green { background: linear-gradient(135deg, #10b981, #34d399); }
    .box-cyan { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
    .box-indigo { background: linear-gradient(135deg, #4f46e5, #6366f1); }
    .box-rose { background: linear-gradient(135deg, #f43f5e, #fb7185); }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: #333;
      font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    footer a { color: #7c3aed; text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 4rem 1.25rem 2.5rem; }
      header .back { left: 1rem; top: 1rem; font-size: 0.75rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 1.5rem 1rem; gap: 0.75rem; }
      .comp-card { padding: 1rem; }
      .comp-card .preview-box { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header>
    <a href="../index.html" class="back">&larr; Back</a>
    <h1 data-aos="fade-up">Flux <span style="color:#7c3aed">Components</span></h1>
    <p data-aos="fade-up" data-aos-delay="100">66+ component types &times; 99 animated variants each</p>

    <div class="search-wrap" data-aos="fade-up" data-aos-delay="200">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search components..." autofocus>
    </div>
    <div class="counter">Showing <span id="showCount">0</span> components</div>
  </header>

  <div class="grid" id="compGrid"></div>

  <footer>
    <p><a href="../index.html">Flux</a> &mdash; Component Library</p>
  </footer>

  <script src="../flux.js"></script>
  <script>
    var components = [
      { file: 'accordion.html', name: 'Accordion', tagline: 'Collapse panels' },
      { file: 'tabs.html', name: 'Tabs', tagline: 'Tabbed interfaces' },
      { file: 'dialogs.html', name: 'Dialogs & Modals', tagline: 'Modal dialogs' },
      { file: 'buttons.html', name: 'Buttons', tagline: '99 variants' },
      { file: 'forms.html', name: 'Forms & Inputs', tagline: 'Form elements' },
      { file: 'file-upload.html', name: 'File Upload', tagline: 'Drag & drop' },
      { file: 'search-filter.html', name: 'Search & Filter', tagline: 'Live filtering' },
      { file: 'time-date.html', name: 'Time & Date', tagline: 'Date pickers' },
      { file: 'clipboard.html', name: 'Clipboard & Copy', tagline: 'Copy to clipboard' },
      { file: 'media.html', name: 'Media Embeds', tagline: 'Rich embeds' },
      { file: 'image-compare.html', name: 'Image Compare', tagline: 'Before & after' },
      { file: 'cards.html', name: 'Cards', tagline: 'Card layouts' },
      { file: 'badges.html', name: 'Badges & Tags', tagline: '99 variants' },
      { file: 'avatars.html', name: 'Avatars', tagline: 'User avatars' },
      { file: 'alerts.html', name: 'Alerts & Toasts', tagline: 'Notifications' },
      { file: 'progress.html', name: 'Progress & Loading', tagline: 'Load indicators' },
      { file: 'navigation.html', name: 'Navigation', tagline: 'Nav menus' },
      { file: 'data-display.html', name: 'Data Display', tagline: 'Data tables' },
      { file: 'interactive.html', name: 'Interactive', tagline: 'Interactive widgets' },
      { file: 'feedback.html', name: 'Feedback & Rating', tagline: 'Star ratings' },
      { file: 'slideshows.html', name: 'Slideshows', tagline: 'Image carousels' },
      { file: 'tooltips.html', name: 'Tooltips & Popovers', tagline: 'Hover tips' },
      { file: 'layout.html', name: 'Layout', tagline: 'Grid & flex' },
      { file: 'utilities.html', name: 'Utilities', tagline: 'Helper classes' },
      { file: 'bluetooth-device.html', name: 'Bluetooth & Device', tagline: 'Web Bluetooth' },
      { file: 'pwa-install.html', name: 'PWA Install', tagline: 'Install prompt' },
      { file: 'novelty.html', name: 'Novelty', tagline: 'Fun effects' },
      { file: 'autosize-textarea.html', name: 'Autosize Textarea', tagline: 'Auto-resize' },
      { file: 'details-dialog.html', name: 'Details Dialog', tagline: 'Native dialog' },
      { file: 'details-menu.html', name: 'Details Menu', tagline: 'Dropdown menus' },
      { file: 'details-utils.html', name: 'Details Utils', tagline: 'Details helpers' },
      { file: 'heading-anchors.html', name: 'Heading Anchors', tagline: 'Link anchors' },
      { file: 'audio-player.html', name: 'Audio Player', tagline: 'Audio playback' },
      { file: 'random-source.html', name: 'Random Source', tagline: 'Random content' },
      { file: 'share-button.html', name: 'Share Button', tagline: 'Native share' },
      { file: 'slide-show.html', name: 'Slide Show', tagline: 'Presentation mode' },
      { file: 'tab-container.html', name: 'Tab Container', tagline: 'Tab panels' },
      { file: 'task-lists.html', name: 'Task Lists', tagline: 'Checklists' },
      { file: 'local-time.html', name: 'Local Time', tagline: 'Time conversion' },
      { file: 'relative-time.html', name: 'Relative Time', tagline: 'Relative dates' },
      { file: 'time-ago.html', name: 'Time Ago', tagline: 'Fuzzy timestamps' },
      { file: 'datepicker.html', name: 'Date Picker', tagline: 'Calendar picker' },
      { file: 'input-knob.html', name: 'Input Knob', tagline: 'Rotary control' },
      { file: 'range-slider.html', name: 'Range Slider', tagline: 'Range inputs' },
      { file: 'show-password.html', name: 'Show Password', tagline: 'Password toggle' },
      { file: 'toggle-categories.html', name: 'Toggle Categories', tagline: 'Category toggles' },
      { file: 'typesense-minibar.html', name: 'Typesense Minibar', tagline: 'Instant search' },
      { file: 'browser-support.html', name: 'Browser Support', tagline: 'Compat table' },
      { file: 'duration-property.html', name: 'Duration Property', tagline: 'Time duration' },
      { file: 'live-filter.html', name: 'Live Filter', tagline: 'Real-time filter' },
      { file: 'print-button.html', name: 'Print Button', tagline: 'Print trigger' },
      { file: 'sample-input.html', name: 'Sample Input', tagline: 'Example inputs' },
      { file: 'slide-deck.html', name: 'Slide Deck', tagline: 'Presentation deck' },
      { file: 'storage-form.html', name: 'Storage Form', tagline: 'LocalStorage forms' },
      { file: 'visual-viewport.html', name: 'Visual Viewport', tagline: 'Viewport API' },
      { file: 'bluesky-post.html', name: 'Bluesky Post', tagline: 'Bluesky embed' },
      { file: 'codepen-embed.html', name: 'CodePen Embed', tagline: 'CodePen embeds' },
      { file: 'lite-youtube.html', name: 'Lite YouTube', tagline: 'Lightweight video' },
      { file: 'mastodon-post.html', name: 'Mastodon Post', tagline: 'Mastodon embed' },
      { file: 'model-viewer.html', name: 'Model Viewer', tagline: '3D models' },
      { file: 'pinch-zoom.html', name: 'Pinch Zoom', tagline: 'Pinch to zoom' },
      { file: 'two-up.html', name: 'Two Up', tagline: 'Side-by-side' },
      { file: 'youtube-player.html', name: 'YouTube Player', tagline: 'YouTube API' },
      { file: 'dark-mode-toggle.html', name: 'Dark Mode Toggle', tagline: 'Theme switch' },
      { file: 'html-include.html', name: 'HTML Include', tagline: 'HTML imports' },
      { file: 'chess-board.html', name: 'Chess Board', tagline: 'Chess UI' }
    ];

    var colors = ['box-purple', 'box-pink', 'box-orange', 'box-green', 'box-cyan', 'box-indigo', 'box-rose'];

    var compGrid = document.getElementById('compGrid');
    var searchInput = document.getElementById('searchInput');
    var showCount = document.getElementById('showCount');

    function render() {
      var q = searchInput.value.toLowerCase().trim();
      var filtered = components.filter(function (c) {
        return !q || c.name.toLowerCase().indexOf(q) !== -1 || c.tagline.toLowerCase().indexOf(q) !== -1;
      });

      if (filtered.length === 0) {
        compGrid.className = 'grid empty';
        compGrid.innerHTML = '<p>No components match your search.</p>';
        showCount.textContent = '0';
        return;
      }

      compGrid.className = 'grid';
      var html = '';
      filtered.forEach(function (c, i) {
        var color = colors[i % colors.length];
        html += '<a href="./' + c.file + '" class="comp-card">';
        html += '<div class="preview-box ' + color + '"></div>';
        html += '<div class="name">' + c.name + '</div>';
        html += '<div class="tagline">' + c.tagline + '</div>';
        html += '</a>';
      });
      compGrid.innerHTML = html;
      showCount.textContent = filtered.length;
    }

    searchInput.addEventListener('input', render);
    render();
  </script>
</body>
</html>
