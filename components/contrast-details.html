      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(function(b) {{ b.classList.remove('active'); }});
      btn.classList.add('active');
      render();
    }});
    document.querySelector('.searchInput') && document.querySelector('.searchInput').addEventListener('input', render);
    render();
  </script>
</body>
</html>
