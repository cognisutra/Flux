<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter & Refine UI — Flux</title>
  <link rel="stylesheet" href="../flux.css">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070a; color: #c8c8d0; line-height: 1.6; overflow-x: hidden;
    }

    .noise {

    }
    header {
      padding: 3rem 2rem 4rem; text-align: center; position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    header .back {
      position: absolute; left: 2rem; top: 2rem; display: inline-flex; align-items: center; gap: 0.4rem;
      color: #555; text-decoration: none; font-size: 0.85rem; transition: color 0.2s;
    }
    header .back:hover { color: #a78bfa; }
    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 800; color: #fff; letter-spacing: -0.03em;
    }
    header h1 span { color: #7c3aed; }
    header p { color: #555; margin-top: 0.5rem; font-size: 0.95rem; }
    .controls {
      max-width: 800px; margin: 2rem auto 0; display: flex; flex-direction: column; gap: 1rem;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; padding: 0.9rem 1.25rem 0.9rem 3rem; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
      color: #e0e0e0; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: rgba(124,58,237,0.3); }
    .search-wrap input::placeholder { color: #444; }
    .search-wrap .search-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #444; font-size: 1.1rem; pointer-events: none;
    }
    .filter-row {
      display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;
    }
    .filter-btn {
      padding: 0.5rem 1.2rem; border-radius: 100px; border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: #666; font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .filter-btn:hover { color: #a78bfa; border-color: rgba(124,58,237,0.2); }
    .filter-btn.active { color: #fff; background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.3); }
    .counter { text-align: center; font-size: 0.8rem; color: #444; margin: 1.5rem 0 0; }
    .counter span { color: #a78bfa; font-weight: 600; }
    .grid {
      max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem 4rem;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem;
    }
    .grid.empty {
      display: flex; align-items: center; justify-content: center; min-height: 200px; color: #444; font-size: 0.95rem;
    }
    .anim-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 1.5rem 1.25rem; text-align: center; transition: all 0.3s;
    }
    .anim-card:hover { border-color: rgba(124,58,237,0.15); transform: translateY(-2px); }
    .anim-card .preview-box {
      width: 72px; height: 72px; border-radius: 12px; margin: 0 auto 1rem;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      will-change: transform, opacity, filter; backface-visibility: hidden;
    }
    .anim-card .preview-box.is-visible {
      opacity: 1 !important; transform: none !important; filter: none !important;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%) !important;
    }
    .anim-card .name {
      font-size: 0.78rem; font-weight: 600; color: #e0e0e0; margin-bottom: 0.2rem; word-break: break-word;
    }
    .anim-card .tag {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.55rem; color: #a78bfa;
      background: rgba(124,58,237,0.08); display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; margin-bottom: 0.85rem;
    }
    .anim-card .cat-tag {
      font-size: 0.55rem; color: #555; display: block; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .anim-card .play-sm {
      padding: 0.4rem 1rem; border-radius: 100px; border: none; background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit;
    }
    .anim-card .play-sm:hover { box-shadow: 0 4px 20px rgba(124,58,237,0.3); transform: scale(1.05); }
    .anim-card .play-sm:active { transform: scale(0.95); }
    .copy-sm {
      padding: 0.4rem 0.5rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: #666; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: inherit; line-height: 1;
    }
    .copy-sm:hover { color: #a78bfa; border-color: rgba(124,58,237,0.3); background: rgba(124,58,237,0.06); }
    .copy-sm.copied { color: #34d399; border-color: rgba(52,211,153,0.3); }
    .box-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .box-pink { background: linear-gradient(135deg, #ec4899, #f472b6); }
    .box-orange { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .box-green { background: linear-gradient(135deg, #10b981, #34d399); }
    .box-cyan { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
    .box-indigo { background: linear-gradient(135deg, #4f46e5, #6366f1); }
    .box-rose { background: linear-gradient(135deg, #f43f5e, #fb7185); }
    .box-red { background: linear-gradient(135deg, #ef4444, #f87171); }
    footer {
      text-align: center; padding: 3rem 2rem; color: #333; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.04);
    }
    footer a { color: #7c3aed; text-decoration: none; }
    @media (max-width: 600px) {
      header { padding: 4rem 1.25rem 2.5rem; }
      header .back { left: 1rem; top: 1rem; font-size: 0.75rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 1.5rem 1rem; gap: 0.75rem; }
      .anim-card { padding: 1rem; }
      .anim-card .preview-box { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <header>
    <a href="../index.html" class="back">&larr; Back</a>

  </header>

  <footer>
    <p><a href="../index.html">Flux</a> &mdash; Component Library</p>

    function render() {{
      var q = (document.querySelector('.searchInput').value || '').toLowerCase().trim();

      var filtered = cards.filter(function(c) {{

        var ms = !q || c.name.toLowerCase().indexOf(q) !== -1 || c.variant.toLowerCase().indexOf(q) !== -1;

        html += '<div class="preview-box ' + c.color + '" data-anim="' + c.anim + '">' + (c.preview || '') + '</div>';

        html += '<div class="tag">data-aos="' + c.anim + '"</div>';

          box.style.animation = '';
