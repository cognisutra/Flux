<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms & Inputs — Flux</title>
  <link rel="stylesheet" href="../flux.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07070a;color:#c8c8d0;line-height:1.6;overflow-x:hidden}
    ::selection{background:#7c3aed;color:#fff}
    .noise{position:fixed;inset:0;z-index:-1;opacity:.035;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
    header{padding:3rem 2rem 4rem;text-align:center;position:relative;border-bottom:1px solid rgba(255,255,255,.04)}
    header .back{position:absolute;left:2rem;top:2rem;display:inline-flex;align-items:center;gap:.4rem;color:#555;text-decoration:none;font-size:.85rem;transition:color .2s}
    header .back:hover{color:#a78bfa}
    header h1{font-size:clamp(1.8rem,4vw,2.5rem);font-weight:800;color:#fff;letter-spacing:-.03em}
    header h1 span{color:#7c3aed}
    header p{color:#555;margin-top:.5rem;font-size:.95rem}
    .controls{max-width:800px;margin:2rem auto 0;display:flex;flex-direction:column;gap:1rem}
    .search-wrap{position:relative}
    .search-wrap input{width:100%;padding:.9rem 1.25rem .9rem 3rem;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#e0e0e0;font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}
    .search-wrap input:focus{border-color:rgba(124,58,237,.3)}
    .search-wrap input::placeholder{color:#444}
    .search-wrap .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#444;font-size:1.1rem;pointer-events:none}
    .filter-row{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
    .filter-btn{padding:.5rem 1.2rem;border-radius:100px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#666;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .filter-btn:hover{color:#a78bfa;border-color:rgba(124,58,237,.2)}
    .filter-btn.active{color:#fff;background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3)}
    .counter{text-align:center;font-size:.8rem;color:#444;margin:1.5rem 0 0}
    .counter span{color:#a78bfa;font-weight:600}
    .grid{max-width:1280px;margin:0 auto;padding:2.5rem 2rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.25rem}
    .grid.empty{display:flex;align-items:center;justify-content:center;min-height:200px;color:#444;font-size:.95rem}
    .anim-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:1.25rem 1rem;text-align:center;transition:all .3s}
    .anim-card:hover{border-color:rgba(124,58,237,.15);transform:translateY(-2px)}
    .anim-card .preview-box{margin:0 auto .85rem;transition:all .5s cubic-bezier(.175,.885,.32,1.275);will-change:transform,opacity,filter;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;width:100%;min-height:72px;overflow:hidden}
    .anim-card .name{font-size:.75rem;font-weight:600;color:#e0e0e0;margin-bottom:.15rem;word-break:break-word}
    .anim-card .tag{font-family:'SF Mono','Fira Code',monospace;font-size:.55rem;color:#a78bfa;background:rgba(124,58,237,.08);display:inline-block;padding:.15rem .5rem;border-radius:4px;margin-bottom:.75rem}
    .anim-card .cat-tag{font-size:.55rem;color:#555;display:block;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em}
    .anim-card .play-sm{padding:.4rem 1rem;border-radius:100px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit}
    .anim-card .play-sm:hover{box-shadow:0 4px 20px rgba(124,58,237,.3);transform:scale(1.05)}
    .anim-card .play-sm:active{transform:scale(.95)}
    .copy-sm{padding:.4rem .5rem;border-radius:6px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#666;font-size:.75rem;cursor:pointer;transition:all .2s;font-family:inherit;line-height:1}
    .copy-sm:hover{color:#a78bfa;border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.06)}
    .copy-sm.copied{color:#34d399;border-color:rgba(52,211,153,.3)}
    footer{text-align:center;padding:3rem 2rem;color:#333;font-size:.8rem;border-top:1px solid rgba(255,255,255,.04)}
    footer a{color:#7c3aed;text-decoration:none}
    @media (max-width:600px){header{padding:4rem 1.25rem 2.5rem}header .back{left:1rem;top:1rem;font-size:.75rem}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));padding:1.5rem 1rem;gap:.75rem}.anim-card{padding:1rem}}

    .f-demo{width:100%;padding:5px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#c8c8d0;font-size:11px;font-family:inherit;outline:none}
    .f-demo:focus{border-color:rgba(124,58,237,.3)}
    .f-demo.f-valid{border-color:rgba(52,211,153,.4)}
    .f-demo.f-error{border-color:rgba(239,68,68,.4)}
    .f-wrap{display:flex;align-items:center;gap:4px;width:100%}
    .f-wrap .f-demo{flex:1}
    .f-icon,.f-prefix,.f-suffix{font-size:11px;color:#666}
    .f-clear-btn{cursor:pointer;color:#666;font-size:14px;line-height:1}
    .f-char-count{position:absolute;right:4px;bottom:1px;font-size:8px;color:#555;pointer-events:none}
    .f-err-msg{display:block;font-size:8px;color:#ef4444;text-align:left}
    .f-floating{position:relative;width:100%}
    .f-floating input{width:100%;padding:10px 8px 2px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#c8c8d0;font-size:11px;outline:none;font-family:inherit}
    .f-floating label{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#555;transition:all .2s;pointer-events:none}
    .f-floating input:focus+label,.f-floating input:not(:placeholder-shown)+label{top:4px;font-size:8px;color:#7c3aed}
    .f-strength{margin-top:2px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
    .f-str-bar{height:100%;border-radius:2px;transition:width .3s}
    .f-str-bar.s3{width:75%;background:linear-gradient(90deg,#10b981,#34d399)}
    .f-step{padding:2px 8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#c8c8d0;cursor:pointer;font-size:12px;line-height:1}
    .f-suggest{position:absolute;top:100%;left:0;right:0;background:#1a1a24;border:1px solid rgba(255,255,255,.08);border-radius:0 0 6px 6px;padding:4px 6px;font-size:8px;color:#666;text-align:left;z-index:2}
    .f-country{font-size:10px;color:#aaa;white-space:nowrap}
    .f-check{display:flex;align-items:center;gap:4px;font-size:10px;color:#c8c8d0;cursor:pointer}
    .f-check input{accent-color:#7c3aed}
    .f-check-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:10px;cursor:pointer;color:#c8c8d0}
    .f-check-btn input{accent-color:#7c3aed}
    .f-toggle{display:inline-flex;align-items:center;gap:4px;cursor:pointer}
    .f-toggle input{display:none}
    .f-toggle-track{width:28px;height:16px;border-radius:10px;background:rgba(255,255,255,.1);position:relative;transition:all .3s;display:inline-block}
    .f-toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#666;transition:all .3s}
    .f-toggle input:checked+.f-toggle-track{background:#7c3aed}
    .f-toggle input:checked+.f-toggle-track::after{left:14px;background:#fff}
    .f-color{width:28px;height:28px;padding:2px;border:1px solid rgba(255,255,255,.1);border-radius:6px;background:transparent;cursor:pointer}
    .f-swatch{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.1);cursor:pointer;display:inline-block}
    .f-file{display:flex;align-items:center;gap:4px;padding:6px 10px;border:1px dashed rgba(255,255,255,.15);border-radius:8px;cursor:pointer;font-size:10px;color:#aaa}
    .f-file input{display:none}
    .f-dropzone{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border:1px dashed rgba(255,255,255,.15);border-radius:8px;width:100%;cursor:pointer}
    .f-range{width:100%;height:4px;accent-color:#7c3aed}
    .f-range-val{font-size:9px;color:#7c3aed;font-weight:600}
    .f-input-addon{padding:5px 8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#666;font-size:10px;line-height:1}
    .f-submit{padding:5px 10px;border:none;border-radius:6px;background:#7c3aed;color:#fff;font-size:10px;cursor:pointer;font-family:inherit}
    .f-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-top-color:#7c3aed;border-radius:50%;animation:f-spin .6s linear infinite;display:inline-block}
    .f-eye{cursor:pointer;color:#666;font-size:14px;line-height:1}
    @keyframes f-spin{to{transform:rotate(360deg)}}
    select.f-demo{appearance:auto}

  </style>
</head>
<body>
  <div class="noise"></div>
  <header>
    <a href="../index.html" class="back">&larr; Back</a>
    <h1 data-aos="fade-up"><span>Flux</span> &mdash; Forms & Inputs</h1>
    <p data-aos="fade-up" data-aos-delay="100">Browse 99 form/input component variants.</p>
    <div class="controls" data-aos="fade-up" data-aos-delay="200">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="Search forms..." autofocus>
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all">All</button>
        
        <button class="filter-btn" data-filter="text">Text</button>
        <button class="filter-btn" data-filter="email">Email</button>
        <button class="filter-btn" data-filter="password">Password</button>
        <button class="filter-btn" data-filter="number">Number</button>
        <button class="filter-btn" data-filter="search">Search</button>
        <button class="filter-btn" data-filter="tel">Tel</button>
        <button class="filter-btn" data-filter="url">URL</button>
        <button class="filter-btn" data-filter="textarea">Textarea</button>
        <button class="filter-btn" data-filter="select">Select</button>
        <button class="filter-btn" data-filter="checkbox">Checkbox</button>
        <button class="filter-btn" data-filter="radio">Radio</button>
        <button class="filter-btn" data-filter="toggle">Toggle</button>
        <button class="filter-btn" data-filter="range">Range</button>
        <button class="filter-btn" data-filter="file">File</button>
        <button class="filter-btn" data-filter="color">Color</button>
        <button class="filter-btn" data-filter="date">Date</button>
        <button class="filter-btn" data-filter="time">Time</button>
        <button class="filter-btn" data-filter="layout">Layout</button>
      </div>
      <div class="counter">Showing <span id="showCount">0</span> forms</div>
    </div>
  </header>
  <div class="grid" id="grid"><div class="preview-box" data-variant="text-default"><input type="text" placeholder="Default input" class="f-demo"></div>
    <div class="preview-box" data-variant="text-icon"><div class="f-wrap"><span class="f-icon">@</span><input type="text" placeholder="With icon" class="f-demo"></div></div>
    <div class="preview-box" data-variant="text-floating"><div class="f-floating"><input type="text" placeholder=" " id="ff1"><label for="ff1">Floating</label></div></div>
    <div class="preview-box" data-variant="text-clear"><div class="f-wrap"><input type="text" placeholder="Clearable" class="f-demo"><span class="f-clear-btn">&times;</span></div></div>
    <div class="preview-box" data-variant="text-count"><div style="position:relative"><input type="text" placeholder="Max 20" maxlength="20" class="f-demo"><span class="f-char-count">0/20</span></div></div>
    <div class="preview-box" data-variant="text-valid"><input type="text" placeholder="Valid" class="f-demo f-valid"></div>
    <div class="preview-box" data-variant="text-error"><div><input type="text" placeholder="Error" class="f-demo f-error"><span class="f-err-msg">Required field</span></div></div>
    <div class="preview-box" data-variant="text-disabled"><input type="text" placeholder="Disabled" class="f-demo" disabled></div>
    <div class="preview-box" data-variant="text-readonly"><input type="text" value="Read only" class="f-demo" readonly></div>
    <div class="preview-box" data-variant="email-default"><input type="email" placeholder="email@example.com" class="f-demo"></div>
    <div class="preview-box" data-variant="email-icon"><div class="f-wrap"><span class="f-icon">&#9993;</span><input type="email" placeholder="With icon" class="f-demo"></div></div>
    <div class="preview-box" data-variant="email-valid"><input type="email" value="user@domain.com" class="f-demo f-valid"></div>
    <div class="preview-box" data-variant="email-error"><input type="email" value="bad-email" class="f-demo f-error"></div>
    <div class="preview-box" data-variant="email-inline"><div style="display:flex;gap:4px"><input type="email" placeholder="Email" class="f-demo" style="flex:1"><button class="f-submit">Go</button></div></div>
    <div class="preview-box" data-variant="password-default"><input type="password" placeholder="Password" class="f-demo"></div>
    <div class="preview-box" data-variant="password-toggle"><div class="f-wrap"><input type="password" placeholder="Toggle" class="f-demo"><span class="f-eye">&#128065;</span></div></div>
    <div class="preview-box" data-variant="password-strength"><div><input type="password" placeholder="Strong" class="f-demo"><div class="f-strength"><div class="f-str-bar s3"></div></div></div></div>
    <div class="preview-box" data-variant="password-icon"><div class="f-wrap"><span class="f-icon">&#128274;</span><input type="password" placeholder="With icon" class="f-demo"></div></div>
    <div class="preview-box" data-variant="password-valid"><input type="password" value="Str0ng!Pass" class="f-demo f-valid"></div>
    <div class="preview-box" data-variant="number-default"><input type="number" placeholder="0" class="f-demo"></div>
    <div class="preview-box" data-variant="number-stepper"><div style="display:flex"><button class="f-step">&minus;</button><input type="number" value="5" class="f-demo" style="width:40px;text-align:center;border-radius:0"><button class="f-step">+</button></div></div>
    <div class="preview-box" data-variant="number-prefix"><div class="f-wrap"><span class="f-prefix">$</span><input type="number" placeholder="0.00" class="f-demo"></div></div>
    <div class="preview-box" data-variant="number-suffix"><div class="f-wrap"><input type="number" placeholder="0" class="f-demo"><span class="f-suffix">kg</span></div></div>
    <div class="preview-box" data-variant="number-currency"><div class="f-wrap"><span class="f-prefix">$</span><input type="number" value="42.99" class="f-demo" step="0.01"></div></div>
    <div class="preview-box" data-variant="search-default"><input type="search" placeholder="Search..." class="f-demo"></div>
    <div class="preview-box" data-variant="search-icon"><div class="f-wrap"><span class="f-icon">&#128269;</span><input type="search" placeholder="Search..." class="f-demo"></div></div>
    <div class="preview-box" data-variant="search-clear"><div class="f-wrap"><span class="f-icon">&#128269;</span><input type="search" placeholder="Type..." class="f-demo"><span class="f-clear-btn">&times;</span></div></div>
    <div class="preview-box" data-variant="search-rounded"><input type="search" placeholder="Rounded" class="f-demo" style="border-radius:100px"></div>
    <div class="preview-box" data-variant="search-suggestions"><div style="position:relative"><input type="search" placeholder="Suggestions" class="f-demo"><div class="f-suggest">recent<br>popular</div></div></div>
    <div class="preview-box" data-variant="tel-default"><input type="tel" placeholder="+1 (555) 000-0000" class="f-demo"></div>
    <div class="preview-box" data-variant="tel-country"><div class="f-wrap"><span class="f-country">&#127482;&#127480; +1</span><input type="tel" placeholder="Phone" class="f-demo"></div></div>
    <div class="preview-box" data-variant="tel-icon"><div class="f-wrap"><span class="f-icon">&#128222;</span><input type="tel" placeholder="Phone" class="f-demo"></div></div>
    <div class="preview-box" data-variant="tel-valid"><input type="tel" value="+1 555-123-4567" class="f-demo f-valid"></div>
    <div class="preview-box" data-variant="tel-error"><input type="tel" value="555" class="f-demo f-error"></div>
    <div class="preview-box" data-variant="url-default"><input type="url" placeholder="https://example.com" class="f-demo"></div>
    <div class="preview-box" data-variant="url-icon"><div class="f-wrap"><span class="f-icon">&#128279;</span><input type="url" placeholder="Website" class="f-demo"></div></div>
    <div class="preview-box" data-variant="url-valid"><input type="url" value="https://flux.dev" class="f-demo f-valid"></div>
    <div class="preview-box" data-variant="url-error"><input type="url" value="not-a-url" class="f-demo f-error"></div>
    <div class="preview-box" data-variant="url-protocol"><div class="f-wrap"><span class="f-prefix" style="font-size:9px">https://</span><input type="url" placeholder="domain.com" class="f-demo"></div></div>
    <div class="preview-box" data-variant="textarea-default"><textarea placeholder="Textarea..." class="f-demo" rows="2" style="resize:none;height:40px"></textarea></div>
    <div class="preview-box" data-variant="textarea-resize"><textarea placeholder="Resizable" class="f-demo" rows="2" style="height:40px"></textarea></div>
    <div class="preview-box" data-variant="textarea-count"><div style="position:relative"><textarea placeholder="Max 100" maxlength="100" class="f-demo" rows="2" style="resize:none;height:36px"></textarea><span class="f-char-count">0/100</span></div></div>
    <div class="preview-box" data-variant="textarea-auto"><textarea placeholder="Auto-grow" class="f-demo" rows="1" style="resize:none;height:30px"></textarea></div>
    <div class="preview-box" data-variant="textarea-error"><div><textarea placeholder="Error" class="f-demo f-error" rows="2" style="resize:none;height:36px"></textarea><span class="f-err-msg">Too short</span></div></div>
    <div class="preview-box" data-variant="select-default"><select class="f-demo"><option>Option 1</option><option>Option 2</option><option>Option 3</option></select></div>
    <div class="preview-box" data-variant="select-icon"><div class="f-wrap"><span class="f-icon">&#127760;</span><select class="f-demo"><option>Language</option><option>English</option></select></div></div>
    <div class="preview-box" data-variant="select-grouped"><select class="f-demo"><optgroup label="Group A"><option>Item A1</option><option>Item A2</option></optgroup><optgroup label="Group B"><option>Item B1</option></optgroup></select></div>
    <div class="preview-box" data-variant="select-multiple"><select multiple class="f-demo" style="height:40px"><option>Opt 1</option><option>Opt 2</option><option>Opt 3</option></select></div>
    <div class="preview-box" data-variant="select-styled"><select class="f-demo" style="background:rgba(124,58,237,.1);border-color:#7c3aed"><option>Styled</option><option>Option</option></select></div>
    <div class="preview-box" data-variant="checkbox-default"><label class="f-check"><input type="checkbox"> Default</label></div>
    <div class="preview-box" data-variant="checkbox-checked"><label class="f-check"><input type="checkbox" checked> Checked</label></div>
    <div class="preview-box" data-variant="checkbox-toggle"><label class="f-toggle"><input type="checkbox" checked><span class="f-toggle-track"></span></label></div>
    <div class="preview-box" data-variant="checkbox-button"><label class="f-check-btn"><input type="checkbox"> Option</label></div>
    <div class="preview-box" data-variant="checkbox-stacked"><div style="display:flex;flex-direction:column;gap:2px;align-items:flex-start"><label class="f-check"><input type="checkbox"> A</label><label class="f-check"><input type="checkbox"> B</label><label class="f-check"><input type="checkbox"> C</label></div></div>
    <div class="preview-box" data-variant="radio-default"><label class="f-check"><input type="radio" name="r1"> Option A</label></div>
    <div class="preview-box" data-variant="radio-selected"><label class="f-check"><input type="radio" name="r2" checked> Selected</label></div>
    <div class="preview-box" data-variant="radio-stacked"><div style="display:flex;flex-direction:column;gap:2px;align-items:flex-start"><label class="f-check"><input type="radio" name="r3"> First</label><label class="f-check"><input type="radio" name="r3"> Second</label></div></div>
    <div class="preview-box" data-variant="radio-button"><label class="f-check-btn"><input type="radio" name="r4"> Choice</label></div>
    <div class="preview-box" data-variant="radio-card"><label class="f-check" style="border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 10px;display:flex;gap:6px"><input type="radio" name="r5"> Card</label></div>
    <div class="preview-box" data-variant="toggle-default"><label class="f-toggle"><input type="checkbox"><span class="f-toggle-track"></span></label></div>
    <div class="preview-box" data-variant="toggle-on"><label class="f-toggle"><input type="checkbox" checked><span class="f-toggle-track"></span></label></div>
    <div class="preview-box" data-variant="toggle-label"><label class="f-toggle" style="display:flex;gap:6px;align-items:center"><span style="font-size:9px">WiFi</span><input type="checkbox" checked><span class="f-toggle-track"></span></label></div>
    <div class="preview-box" data-variant="toggle-colored"><label class="f-toggle"><input type="checkbox" checked><span class="f-toggle-track" style="background:#7c3aed"></span></label></div>
    <div class="preview-box" data-variant="toggle-sized"><label class="f-toggle"><input type="checkbox" checked><span class="f-toggle-track" style="width:32px;height:18px"></span></label></div>
    <div class="preview-box" data-variant="range-default"><input type="range" class="f-range" style="width:100%"></div>
    <div class="preview-box" data-variant="range-value"><div style="display:flex;flex-direction:column;align-items:center;gap:2px"><input type="range" class="f-range" style="width:100%"><span class="f-range-val">50</span></div></div>

p:8px;align-items:center;justify-content:center\"><label class=\"f-check\"><input type=\"checkbox\"> A</label><label class=\"f-check\"><input type=\"checkbox\"> B</label><label class=\"f-check\"><input type=\"checkbox\"> C</label></div></div>", "tag": "data-variant=\"layout-checkbox-inline\""}, {"name": "layout-radio-inline", "group": "Layout", "preview": "<div class=\"preview-box\" data-variant=\"layout-radio-inline\"><div style=\"display:flex;gap:8px;align-items:center;justify-content:center\"><label class=\"f-check\"><input type=\"radio\" name=\"rx\"> X</label><label class=\"f-check\"><input type=\"radio\" name=\"rx\"> Y</label></div></div>", "tag": "data-variant=\"layout-radio-inline\""}, {"name": "layout-password-confirm", "group": "Layout", "preview": "<div class=\"preview-box\" data-variant=\"layout-password-confirm\"><div style=\"display:flex;flex-direction:column;gap:3px\"><input type=\"password\" placeholder=\"Password\" class=\"f-demo\" style=\"font-size:10px\"><input type=\"password\" placeholder=\"Confirm\" class=\"f-demo\" style=\"font-size:10px\"></div></div>", "tag": "data-variant=\"layout-password-confirm\""}];
    var groups = {};
    cards.forEach(function(c){if(!groups[c.group])groups[c.group]=true});
    var filterRow=document.getElementById('filterRow');
    Object.keys(groups).forEach(function(g){
      var btn=document.createElement('button');
      btn.className='filter-btn';
      btn.setAttribute('data-filter',g.toLowerCase());
      btn.textContent=g;
      filterRow.appendChild(btn);
    });
    var grid=document.getElementById('grid'),searchInput=document.getElementById('searchInput'),showCount=document.getElementById('showCount'),activeFilter='all';
    function render(){
      var q=searchInput.value.toLowerCase().trim();
      var filtered=cards.filter(function(c){
        return (activeFilter==='all'||c.group.toLowerCase()===activeFilter)&&(!q||c.name.indexOf(q)!==-1);
      });
      if(filtered.length===0){grid.className='grid empty';grid.innerHTML='<p>No matches found.</p>';showCount.textContent='0';return;}
      grid.className='grid';
      var html='';
      filtered.forEach(function(c){
        html+='<div class="anim-card">'+c.preview+'<div class="cat-tag">'+c.group+'</div><div class="name">'+c.name+'</div><div class="tag">'+c.tag+'</div><div style="display:flex;gap:0.4rem;justify-content:center"><button class="play-sm">&#9654; Play</button><button class="copy-sm" data-code="'+c.tag+'" title="Copy to clipboard">Copy</button></div></div>';
      });
      grid.innerHTML=html;
      showCount.textContent=filtered.length;
      grid.querySelectorAll('.play-sm').forEach(function(btn){
        btn.addEventListener('click',function(){
          var card=btn.closest('.anim-card');
          var box=card.querySelector('.preview-box');
          box.classList.remove('is-visible');
          box.style.animation='none';void box.offsetHeight;box.style.animation='';
          setTimeout(function(){box.classList.add('is-visible');},10);
        });
      });
      grid.querySelectorAll('.copy-sm').forEach(function(btn){
        btn.addEventListener('click',function(){
          var code=btn.getAttribute('data-code');
          if(navigator.clipboard){
            navigator.clipboard.writeText(code).then(function(){
              btn.textContent='Copied!';btn.classList.add('copied');
              setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied');},1200);
            });
          }
        });
      });
    }
    filterRow.addEventListener('click',function(e){
      var btn=e.target.closest('.filter-btn');if(!btn)return;
      filterRow.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');activeFilter=btn.getAttribute('data-filter');render();
    });
    searchInput.addEventListener('input',render);
    render();
  </script>
