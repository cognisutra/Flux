          if (navigator.clipboard) {{
            navigator.clipboard.writeText(code).then(function() {{
              btn.textContent = 'Copied!';
              btn.classList.add('copied');
              setTimeout(function() {{ btn.textContent = 'Copy'; btn.classList.remove('copied'); }}, 1200);
            }});
          }}
        }});
      }});
    }}
    document.querySelector('.filterRow') && document.querySelector('.filterRow').addEventListener('click', function(e) {{
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(function(b) {{ b.classList.remove('active'); }});
      btn.classList.add('active');
      render();
    }});
    document.querySelector('.searchInput') && document.querySelector('.searchInput').addEventListener('input', render);
    render();
  </script>
</body>
</html>
