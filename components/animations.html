<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Animations — Flux</title>
  <link rel="stylesheet" href="flux.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070a;
      color: #c8c8d0;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::selection { background: #7c3aed; color: #fff; }

    .noise {
      position: fixed; inset: 0; z-index: -1; opacity: 0.035; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    header {
      padding: 3rem 2rem 4rem;
      text-align: center;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    header .back {
      position: absolute;
      left: 2rem;
      top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #555;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    header .back:hover { color: #a78bfa; }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
    }

    header h1 span { color: #7c3aed; }

    header p {
      color: #555;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    .controls {
      max-width: 800px;
      margin: 2rem auto 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.9rem 1.25rem 0.9rem 3rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: rgba(124,58,237,0.3);
    }

    .search-wrap input::placeholder { color: #444; }

    .search-wrap .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #444;
      font-size: 1.1rem;
      pointer-events: none;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .filter-btn {
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: #666;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .filter-btn:hover {
      color: #a78bfa;
      border-color: rgba(124,58,237,0.2);
    }

    .filter-btn.active {
      color: #fff;
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.3);
    }

    .counter {
      text-align: center;
      font-size: 0.8rem;
      color: #444;
      margin: 1.5rem 0 0;
    }

    .counter span { color: #a78bfa; font-weight: 600; }

    .grid {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .grid.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: #444;
      font-size: 0.95rem;
    }

    .anim-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 1.5rem 1.25rem;
      text-align: center;
      transition: all 0.3s;
    }

    .anim-card:hover {
      border-color: rgba(124,58,237,0.15);
      transform: translateY(-2px);
    }

    .anim-card .preview-box {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      margin: 0 auto 1rem;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
    }

    .anim-card .preview-box.is-visible {
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%) !important;
    }

    .anim-card .name {
      font-size: 0.78rem;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .anim-card .tag {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.55rem;
      color: #a78bfa;
      background: rgba(124,58,237,0.08);
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.85rem;
    }

    .anim-card .cat-tag {
      font-size: 0.55rem;
      color: #555;
      display: block;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .anim-card .play-sm {
      padding: 0.4rem 1rem;
      border-radius: 100px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .anim-card .play-sm:hover {
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
      transform: scale(1.05);
    }

    .anim-card .play-sm:active { transform: scale(0.95); }

    .copy-sm {
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: #666;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      line-height: 1;
    }

    .copy-sm:hover {
      color: #a78bfa;
      border-color: rgba(124,58,237,0.3);
      background: rgba(124,58,237,0.06);
    }

    .copy-sm.copied {
      color: #34d399;
      border-color: rgba(52,211,153,0.3);
    }

    /* ── PREVIEW STATES ── */
    .preview-box[data-anim="fade-in"] { opacity: 0; }
    .preview-box[data-anim="fade-up"] { opacity: 0; transform: translateY(60px); }
    .preview-box[data-anim="fade-down"] { opacity: 0; transform: translateY(-60px); }
    .preview-box[data-anim="fade-left"] { opacity: 0; transform: translateX(60px); }
    .preview-box[data-anim="fade-right"] { opacity: 0; transform: translateX(-60px); }
    .preview-box[data-anim="fade-up-right"] { opacity: 0; transform: translate(-60px, 60px); }
    .preview-box[data-anim="fade-up-left"] { opacity: 0; transform: translate(60px, 60px); }
    .preview-box[data-anim="fade-down-right"] { opacity: 0; transform: translate(-60px, -60px); }
    .preview-box[data-anim="fade-down-left"] { opacity: 0; transform: translate(60px, -60px); }

    .preview-box[data-anim="flip-left"] { opacity: 0; transform: perspective(800px) rotateY(-80deg); }
    .preview-box[data-anim="flip-right"] { opacity: 0; transform: perspective(800px) rotateY(80deg); }
    .preview-box[data-anim="flip-up"] { opacity: 0; transform: perspective(800px) rotateX(-80deg); }
    .preview-box[data-anim="flip-down"] { opacity: 0; transform: perspective(800px) rotateX(80deg); }

    .preview-box[data-anim="slide-up"] { opacity: 0; transform: translateY(100%); }
    .preview-box[data-anim="slide-down"] { opacity: 0; transform: translateY(-100%); }
    .preview-box[data-anim="slide-left"] { opacity: 0; transform: translateX(100%); }
    .preview-box[data-anim="slide-right"] { opacity: 0; transform: translateX(-100%); }

    .preview-box[data-anim="zoom-in"] { opacity: 0; transform: scale(0.4); }
    .preview-box[data-anim="zoom-in-up"] { opacity: 0; transform: scale(0.4) translateY(60px); }
    .preview-box[data-anim="zoom-in-down"] { opacity: 0; transform: scale(0.4) translateY(-60px); }
    .preview-box[data-anim="zoom-in-left"] { opacity: 0; transform: scale(0.4) translateX(60px); }
    .preview-box[data-anim="zoom-in-right"] { opacity: 0; transform: scale(0.4) translateX(-60px); }
    .preview-box[data-anim="zoom-out"] { opacity: 0; transform: scale(1.4); }
    .preview-box[data-anim="zoom-out-up"] { opacity: 0; transform: scale(1.4) translateY(60px); }
    .preview-box[data-anim="zoom-out-down"] { opacity: 0; transform: scale(1.4) translateY(-60px); }
    .preview-box[data-anim="zoom-out-left"] { opacity: 0; transform: scale(1.4) translateX(60px); }
    .preview-box[data-anim="zoom-out-right"] { opacity: 0; transform: scale(1.4) translateX(-60px); }

    .preview-box[data-anim="rotate-in"] { opacity: 0; transform: rotate(-20deg) scale(0.6); }
    .preview-box[data-anim="rotate-out"] { opacity: 0; transform: rotate(20deg) scale(1.2); }
    .preview-box[data-anim="blur-in"] { opacity: 0; filter: blur(15px); }
    .preview-box[data-anim="blur-in-up"] { opacity: 0; filter: blur(8px); transform: translateY(40px); }
    .preview-box[data-anim="skew-in"] { opacity: 0; transform: skewX(-25deg) scale(0.8); }
    .preview-box[data-anim="clip-in"] { opacity: 0; clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }

    .preview-box[data-anim="scale-x"] { opacity: 0; transform: scaleX(0); transform-origin: left; }
    .preview-box[data-anim="scale-y"] { opacity: 0; transform: scaleY(0); transform-origin: top; }
    .preview-box[data-anim="perspective-in"] { opacity: 0; transform: perspective(600px) rotateX(-50deg) scale(0.7); transform-origin: 50% 0; }
    .preview-box[data-anim="elastic-up"] { opacity: 0; transform: translateY(80px); }
    .preview-box[data-anim="elastic-left"] { opacity: 0; transform: translateX(80px); }
    .preview-box[data-anim="elastic-right"] { opacity: 0; transform: translateX(-80px); }

    .preview-box[data-anim="bounce-in"] { opacity: 0; }
    .preview-box[data-anim="bounce-in-up"] { opacity: 0; }
    .preview-box[data-anim="bounce-in-down"] { opacity: 0; }
    .preview-box[data-anim="bounce-in-left"] { opacity: 0; }
    .preview-box[data-anim="bounce-in-right"] { opacity: 0; }

    .preview-box[data-anim="back-in-up"] { opacity: 0; }
    .preview-box[data-anim="back-in-down"] { opacity: 0; }
    .preview-box[data-anim="back-in-left"] { opacity: 0; }
    .preview-box[data-anim="back-in-right"] { opacity: 0; }

    .preview-box[data-anim="bounce"] { opacity: 0; }
    .preview-box[data-anim="flash"] { opacity: 0; }
    .preview-box[data-anim="pulse"] { opacity: 0; }
    .preview-box[data-anim="shake-x"] { opacity: 0; }
    .preview-box[data-anim="shake-y"] { opacity: 0; }
    .preview-box[data-anim="swing"] { opacity: 0; }
    .preview-box[data-anim="heartbeat"] { opacity: 0; }
    .preview-box[data-anim="jello"] { opacity: 0; }

    .preview-box[data-anim="light-speed-in"] { opacity: 0; }
    .preview-box[data-anim="light-speed-out"] { opacity: 0; }

    .preview-box[data-anim="reveal-left"] { opacity: 0; clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
    .preview-box[data-anim="reveal-right"] { opacity: 0; clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%); }
    .preview-box[data-anim="reveal-up"] { opacity: 0; clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); }
    .preview-box[data-anim="reveal-down"] { opacity: 0; clip-path: polygon(0 0, 100% 0, 100% 0, 0 0); }

    .preview-box[data-anim="float"] { opacity: 0; }
    .preview-box[data-anim="float-reverse"] { opacity: 0; }

    .preview-box[data-anim="rotate-down-left"] { opacity: 0; }
    .preview-box[data-anim="rotate-down-right"] { opacity: 0; }
    .preview-box[data-anim="rotate-up-left"] { opacity: 0; }
    .preview-box[data-anim="rotate-up-right"] { opacity: 0; }

    .preview-box[data-anim="perspective-out"] { opacity: 1; }
    .preview-box[data-anim="perspective-up"] { opacity: 0; }
    .preview-box[data-anim="perspective-down"] { opacity: 0; }
    .preview-box[data-anim="perspective-left"] { opacity: 0; }
    .preview-box[data-anim="perspective-right"] { opacity: 0; }

    .preview-box[data-anim="spring-up"] { opacity: 0; }
    .preview-box[data-anim="spring-down"] { opacity: 0; }
    .preview-box[data-anim="spring-left"] { opacity: 0; }
    .preview-box[data-anim="spring-right"] { opacity: 0; }

    .preview-box[data-anim="stretch-x"] { opacity: 0; }
    .preview-box[data-anim="stretch-y"] { opacity: 0; }

    .preview-box[data-anim="fold-up"] { opacity: 0; }
    .preview-box[data-anim="fold-down"] { opacity: 0; }
    .preview-box[data-anim="fold-left"] { opacity: 0; }
    .preview-box[data-anim="fold-right"] { opacity: 0; }

    .preview-box[data-anim="glide-up"] { opacity: 0; filter: blur(4px); }
    .preview-box[data-anim="glide-down"] { opacity: 0; filter: blur(4px); }
    .preview-box[data-anim="glide-left"] { opacity: 0; filter: blur(4px); }
    .preview-box[data-anim="glide-right"] { opacity: 0; filter: blur(4px); }

    .preview-box[data-anim="roll-in"] { opacity: 0; }
    .preview-box[data-anim="roll-out"] { opacity: 1; }

    .preview-box[data-anim="spin-in"] { opacity: 0; }
    .preview-box[data-anim="spin-out"] { opacity: 1; }

    .preview-box[data-anim="wipe-left"] { opacity: 0; clip-path: inset(0 0 0 100%); }
    .preview-box[data-anim="wipe-right"] { opacity: 0; clip-path: inset(0 100% 0 0); }
    .preview-box[data-anim="wipe-up"] { opacity: 0; clip-path: inset(100% 0 0 0); }
    .preview-box[data-anim="wipe-down"] { opacity: 0; clip-path: inset(0 0 100% 0); }

    .preview-box[data-anim="drop-in"] { opacity: 0; }
    .preview-box[data-anim="dangle"] { opacity: 0; }
    .preview-box[data-anim="rattle"] { opacity: 0; }
    .preview-box[data-anim="pop-in"] { opacity: 0; }

    .preview-box[data-anim="bounce-in"].is-visible { animation: a-bounce-in 0.8s ease both; }
    .preview-box[data-anim="bounce-in-up"].is-visible { animation: a-bounce-in-up 0.9s ease both; }
    .preview-box[data-anim="bounce-in-down"].is-visible { animation: a-bounce-in-down 0.9s ease both; }
    .preview-box[data-anim="bounce-in-left"].is-visible { animation: a-bounce-in-left 0.9s ease both; }
    .preview-box[data-anim="bounce-in-right"].is-visible { animation: a-bounce-in-right 0.9s ease both; }

    .preview-box[data-anim="back-in-up"].is-visible { animation: a-back-in-up 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="back-in-down"].is-visible { animation: a-back-in-down 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="back-in-left"].is-visible { animation: a-back-in-left 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="back-in-right"].is-visible { animation: a-back-in-right 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }

    .preview-box[data-anim="bounce"].is-visible { animation: a-bounce 1s ease both; }
    .preview-box[data-anim="flash"].is-visible { animation: a-flash 1s ease both; }
    .preview-box[data-anim="pulse"].is-visible { animation: a-pulse 1s ease both; }
    .preview-box[data-anim="shake-x"].is-visible { animation: a-shake-x 0.8s ease both; }
    .preview-box[data-anim="shake-y"].is-visible { animation: a-shake-y 0.8s ease both; }
    .preview-box[data-anim="swing"].is-visible { animation: a-swing 1s ease both; }
    .preview-box[data-anim="heartbeat"].is-visible { animation: a-heartbeat 1.2s ease both; }
    .preview-box[data-anim="jello"].is-visible { animation: a-jello 1s ease both; }

    .preview-box[data-anim="light-speed-in"].is-visible { animation: a-light-speed-in 0.7s ease-out both; }
    .preview-box[data-anim="light-speed-out"].is-visible { animation: a-light-speed-out 0.6s ease-in both; }

    .preview-box[data-anim="reveal-left"].is-visible { animation: none; }
    .preview-box[data-anim="reveal-right"].is-visible { animation: none; }
    .preview-box[data-anim="reveal-up"].is-visible { animation: none; }
    .preview-box[data-anim="reveal-down"].is-visible { animation: none; }

    .preview-box[data-anim="float"].is-visible { animation: a-float 3s ease-in-out infinite both; }
    .preview-box[data-anim="float-reverse"].is-visible { animation: a-float-reverse 3s ease-in-out infinite both; }

    .preview-box[data-anim="rotate-down-left"].is-visible { animation: a-rotate-down-left 0.7s ease both; transform-origin: bottom left; }
    .preview-box[data-anim="rotate-down-right"].is-visible { animation: a-rotate-down-right 0.7s ease both; transform-origin: bottom right; }
    .preview-box[data-anim="rotate-up-left"].is-visible { animation: a-rotate-up-left 0.7s ease both; transform-origin: top left; }
    .preview-box[data-anim="rotate-up-right"].is-visible { animation: a-rotate-up-right 0.7s ease both; transform-origin: top right; }

    .preview-box[data-anim="perspective-out"].is-visible { animation: a-perspective-out 0.5s ease-in both; }
    .preview-box[data-anim="perspective-up"].is-visible { animation: a-perspective-up 0.7s ease both; }
    .preview-box[data-anim="perspective-down"].is-visible { animation: a-perspective-down 0.7s ease both; }
    .preview-box[data-anim="perspective-left"].is-visible { animation: a-perspective-left 0.7s ease both; }
    .preview-box[data-anim="perspective-right"].is-visible { animation: a-perspective-right 0.7s ease both; }

    .preview-box[data-anim="spring-up"].is-visible { animation: a-spring-up 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="spring-down"].is-visible { animation: a-spring-down 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="spring-left"].is-visible { animation: a-spring-left 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="spring-right"].is-visible { animation: a-spring-right 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }

    .preview-box[data-anim="stretch-x"].is-visible { animation: a-stretch-x 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="stretch-y"].is-visible { animation: a-stretch-y 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }

    .preview-box[data-anim="fold-up"].is-visible { animation: a-fold-up 0.6s ease both; transform-origin: bottom; }
    .preview-box[data-anim="fold-down"].is-visible { animation: a-fold-down 0.6s ease both; transform-origin: top; }
    .preview-box[data-anim="fold-left"].is-visible { animation: a-fold-left 0.6s ease both; transform-origin: right; }
    .preview-box[data-anim="fold-right"].is-visible { animation: a-fold-right 0.6s ease both; transform-origin: left; }

    .preview-box[data-anim="glide-up"].is-visible { animation: a-glide-up 0.7s ease both; }
    .preview-box[data-anim="glide-down"].is-visible { animation: a-glide-down 0.7s ease both; }
    .preview-box[data-anim="glide-left"].is-visible { animation: a-glide-left 0.7s ease both; }
    .preview-box[data-anim="glide-right"].is-visible { animation: a-glide-right 0.7s ease both; }

    .preview-box[data-anim="roll-in"].is-visible { animation: a-roll-in 0.7s ease both; }
    .preview-box[data-anim="roll-out"].is-visible { animation: a-roll-out 0.6s ease-in both; }

    .preview-box[data-anim="spin-in"].is-visible { animation: a-spin-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .preview-box[data-anim="spin-out"].is-visible { animation: a-spin-out 0.6s ease-in both; }

    .preview-box[data-anim="wipe-left"].is-visible { animation: a-wipe-left 0.6s ease both; }
    .preview-box[data-anim="wipe-right"].is-visible { animation: a-wipe-right 0.6s ease both; }
    .preview-box[data-anim="wipe-up"].is-visible { animation: a-wipe-up 0.6s ease both; }
    .preview-box[data-anim="wipe-down"].is-visible { animation: a-wipe-down 0.6s ease both; }

    .preview-box[data-anim="drop-in"].is-visible { animation: a-drop-in 0.9s cubic-bezier(0.215, 0.610, 0.355, 1.000) both; }
    .preview-box[data-anim="dangle"].is-visible { animation: a-dangle 1.2s ease both; transform-origin: top center; }
    .preview-box[data-anim="rattle"].is-visible { animation: a-rattle 0.7s ease both; }
    .preview-box[data-anim="pop-in"].is-visible { animation: a-pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }

    .box-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .box-pink { background: linear-gradient(135deg, #ec4899, #f472b6); }
    .box-orange { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .box-green { background: linear-gradient(135deg, #10b981, #34d399); }
    .box-cyan { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
    .box-indigo { background: linear-gradient(135deg, #4f46e5, #6366f1); }
    .box-rose { background: linear-gradient(135deg, #f43f5e, #fb7185); }
    .box-red { background: linear-gradient(135deg, #ef4444, #f87171); }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: #333;
      font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    footer a { color: #7c3aed; text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 4rem 1.25rem 2.5rem; }
      header .back { left: 1rem; top: 1rem; font-size: 0.75rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 1.5rem 1rem; gap: 0.75rem; }
      .anim-card { padding: 1rem; }
      .anim-card .preview-box { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header>
    <a href="index.html" class="back">&larr; Back</a>
    <h1 data-aos="fade-up"><span>Flux</span> &mdash; All Animations</h1>
    <p data-aos="fade-up" data-aos-delay="100">Browse, search, and preview every animation in the library.</p>

    <div class="controls" data-aos="fade-up" data-aos-delay="200">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="Search animations..." autofocus>
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all">All</button>
      </div>
      <div class="counter">Showing <span id="showCount">0</span> animations</div>
    </div>
  </header>

  <div class="grid" id="animGrid"></div>

  <footer>
    <p><a href="index.html">Flux</a> &mdash; Animation Library</p>
  </footer>

  <script src="flux.js"></script>
  <script>
    var animations = [
      { name: 'fade-in', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-up', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-down', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-left', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-right', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-up-right', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-up-left', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-down-right', category: 'fade', group: 'Fade', color: 'box-purple' },
      { name: 'fade-down-left', category: 'fade', group: 'Fade', color: 'box-purple' },

      { name: 'flip-left', category: 'flip', group: 'Flip', color: 'box-pink' },
      { name: 'flip-right', category: 'flip', group: 'Flip', color: 'box-pink' },
      { name: 'flip-up', category: 'flip', group: 'Flip', color: 'box-pink' },
      { name: 'flip-down', category: 'flip', group: 'Flip', color: 'box-pink' },

      { name: 'slide-up', category: 'slide', group: 'Slide', color: 'box-orange' },
      { name: 'slide-down', category: 'slide', group: 'Slide', color: 'box-orange' },
      { name: 'slide-left', category: 'slide', group: 'Slide', color: 'box-orange' },
      { name: 'slide-right', category: 'slide', group: 'Slide', color: 'box-orange' },

      { name: 'zoom-in', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-in-up', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-in-down', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-in-left', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-in-right', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-out', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-out-up', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-out-down', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-out-left', category: 'zoom', group: 'Zoom', color: 'box-green' },
      { name: 'zoom-out-right', category: 'zoom', group: 'Zoom', color: 'box-green' },

      { name: 'rotate-in', category: 'special', group: 'Special', color: 'box-cyan' },
      { name: 'rotate-out', category: 'special', group: 'Special', color: 'box-cyan' },
      { name: 'blur-in', category: 'special', group: 'Special', color: 'box-cyan' },
      { name: 'blur-in-up', category: 'special', group: 'Special', color: 'box-cyan' },
      { name: 'skew-in', category: 'special', group: 'Special', color: 'box-cyan' },
      { name: 'clip-in', category: 'special', group: 'Special', color: 'box-cyan' },

      { name: 'scale-x', category: 'extra', group: 'Extra', color: 'box-indigo' },
      { name: 'scale-y', category: 'extra', group: 'Extra', color: 'box-indigo' },
      { name: 'perspective-in', category: 'extra', group: 'Extra', color: 'box-indigo' },
      { name: 'elastic-up', category: 'extra', group: 'Extra', color: 'box-indigo' },
      { name: 'elastic-left', category: 'extra', group: 'Extra', color: 'box-indigo' },
      { name: 'elastic-right', category: 'extra', group: 'Extra', color: 'box-indigo' },

      { name: 'bounce-in', category: 'bounce', group: 'Bounce', color: 'box-red' },
      { name: 'bounce-in-up', category: 'bounce', group: 'Bounce', color: 'box-red' },
      { name: 'bounce-in-down', category: 'bounce', group: 'Bounce', color: 'box-red' },
      { name: 'bounce-in-left', category: 'bounce', group: 'Bounce', color: 'box-red' },
      { name: 'bounce-in-right', category: 'bounce', group: 'Bounce', color: 'box-red' },

      { name: 'back-in-up', category: 'back', group: 'Back', color: 'box-rose' },
      { name: 'back-in-down', category: 'back', group: 'Back', color: 'box-rose' },
      { name: 'back-in-left', category: 'back', group: 'Back', color: 'box-rose' },
      { name: 'back-in-right', category: 'back', group: 'Back', color: 'box-rose' },

      { name: 'bounce', category: 'attention', group: 'Attention', color: 'box-cyan' },
      { name: 'flash', category: 'attention', group: 'Attention', color: 'box-cyan' },
      { name: 'pulse', category: 'attention', group: 'Attention', color: 'box-cyan' },
      { name: 'shake-x', category: 'attention', group: 'Attention', color: 'box-cyan' },
      { name: 'shake-y', category: 'attention', group: 'Attention', color: 'box-cyan' },
      { name: 'swing', category: 'attention', group: 'Attention', color: 'box-cyan' },
      { name: 'heartbeat', category: 'attention', group: 'Attention', color: 'box-cyan' },
      { name: 'jello', category: 'attention', group: 'Attention', color: 'box-cyan' },

      { name: 'light-speed-in', category: 'lightspeed', group: 'LightSpeed', color: 'box-orange' },
      { name: 'light-speed-out', category: 'lightspeed', group: 'LightSpeed', color: 'box-orange' },

      { name: 'reveal-left', category: 'reveal', group: 'Reveal', color: 'box-purple' },
      { name: 'reveal-right', category: 'reveal', group: 'Reveal', color: 'box-purple' },
      { name: 'reveal-up', category: 'reveal', group: 'Reveal', color: 'box-purple' },
      { name: 'reveal-down', category: 'reveal', group: 'Reveal', color: 'box-purple' },

      { name: 'float', category: 'float', group: 'Float', color: 'box-green' },
      { name: 'float-reverse', category: 'float', group: 'Float', color: 'box-green' },

      { name: 'rotate-down-left', category: 'rotate', group: 'Rotate', color: 'box-rose' },
      { name: 'rotate-down-right', category: 'rotate', group: 'Rotate', color: 'box-rose' },
      { name: 'rotate-up-left', category: 'rotate', group: 'Rotate', color: 'box-rose' },
      { name: 'rotate-up-right', category: 'rotate', group: 'Rotate', color: 'box-rose' },

      { name: 'perspective-out', category: 'perspective', group: 'Perspective', color: 'box-indigo' },
      { name: 'perspective-up', category: 'perspective', group: 'Perspective', color: 'box-indigo' },
      { name: 'perspective-down', category: 'perspective', group: 'Perspective', color: 'box-indigo' },
      { name: 'perspective-left', category: 'perspective', group: 'Perspective', color: 'box-indigo' },
      { name: 'perspective-right', category: 'perspective', group: 'Perspective', color: 'box-indigo' },

      { name: 'spring-up', category: 'spring', group: 'Spring', color: 'box-green' },
      { name: 'spring-down', category: 'spring', group: 'Spring', color: 'box-green' },
      { name: 'spring-left', category: 'spring', group: 'Spring', color: 'box-green' },
      { name: 'spring-right', category: 'spring', group: 'Spring', color: 'box-green' },

      { name: 'stretch-x', category: 'stretch', group: 'Stretch', color: 'box-cyan' },
      { name: 'stretch-y', category: 'stretch', group: 'Stretch', color: 'box-cyan' },

      { name: 'fold-up', category: 'fold', group: 'Fold', color: 'box-purple' },
      { name: 'fold-down', category: 'fold', group: 'Fold', color: 'box-purple' },
      { name: 'fold-left', category: 'fold', group: 'Fold', color: 'box-purple' },
      { name: 'fold-right', category: 'fold', group: 'Fold', color: 'box-purple' },

      { name: 'glide-up', category: 'glide', group: 'Glide', color: 'box-pink' },
      { name: 'glide-down', category: 'glide', group: 'Glide', color: 'box-pink' },
      { name: 'glide-left', category: 'glide', group: 'Glide', color: 'box-pink' },
      { name: 'glide-right', category: 'glide', group: 'Glide', color: 'box-pink' },

      { name: 'roll-in', category: 'roll', group: 'Roll', color: 'box-orange' },
      { name: 'roll-out', category: 'roll', group: 'Roll', color: 'box-orange' },

      { name: 'spin-in', category: 'spin', group: 'Spin', color: 'box-red' },
      { name: 'spin-out', category: 'spin', group: 'Spin', color: 'box-red' },

      { name: 'wipe-left', category: 'wipe', group: 'Wipe', color: 'box-rose' },
      { name: 'wipe-right', category: 'wipe', group: 'Wipe', color: 'box-rose' },
      { name: 'wipe-up', category: 'wipe', group: 'Wipe', color: 'box-rose' },
      { name: 'wipe-down', category: 'wipe', group: 'Wipe', color: 'box-rose' },

      { name: 'drop-in', category: 'drop', group: 'Drop', color: 'box-cyan' },
      { name: 'dangle', category: 'dangle', group: 'Dangle', color: 'box-purple' },
      { name: 'rattle', category: 'rattle', group: 'Rattle', color: 'box-orange' },
      { name: 'pop-in', category: 'pop', group: 'Pop', color: 'box-green' }
    ];

    var groups = {};
    animations.forEach(function (a) {
      if (!groups[a.group]) groups[a.group] = true;
    });

    var filterRow = document.getElementById('filterRow');
    Object.keys(groups).forEach(function (g) {
      var btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.setAttribute('data-filter', g.toLowerCase());
      btn.textContent = g;
      filterRow.appendChild(btn);
    });

    var animGrid = document.getElementById('animGrid');
    var searchInput = document.getElementById('searchInput');
    var showCount = document.getElementById('showCount');
    var activeFilter = 'all';

    function render() {
      var q = searchInput.value.toLowerCase().trim();
      var filtered = animations.filter(function (a) {
        var matchFilter = activeFilter === 'all' || a.group.toLowerCase() === activeFilter;
        var matchSearch = !q || a.name.indexOf(q) !== -1;
        return matchFilter && matchSearch;
      });

      if (filtered.length === 0) {
        animGrid.className = 'grid empty';
        animGrid.innerHTML = '<p>No animations match your search.</p>';
        showCount.textContent = '0';
        return;
      }

      animGrid.className = 'grid';
      var html = '';
      filtered.forEach(function (a) {
        html += '<div class="anim-card">';
        html += '<div class="preview-box ' + a.color + '" data-anim="' + a.name + '"></div>';
        html += '<div class="cat-tag">' + a.group + '</div>';
        html += '<div class="name">' + a.name + '</div>';
        html += '<div class="tag">data-aos="' + a.name + '"</div>';
        html += '<div style="display:flex;gap:0.4rem;justify-content:center">';
        html += '<button class="play-sm">&#9654; Play</button>';
        html += '<button class="copy-sm" data-code="data-aos=&quot;' + a.name + '&quot;" title="Copy to clipboard">Copy</button>';
        html += '</div>';
        html += '</div>';
      });
      animGrid.innerHTML = html;

      showCount.textContent = filtered.length;

      animGrid.querySelectorAll('.play-sm').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var card = btn.closest('.anim-card');
          var box = card.querySelector('.preview-box');
          box.classList.remove('is-visible');
          box.style.animation = 'none';
          void box.offsetHeight;
          box.style.animation = '';
          setTimeout(function () {
            box.classList.add('is-visible');
          }, 10);
        });
      });

      animGrid.querySelectorAll('.copy-sm').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var code = btn.getAttribute('data-code');
          if (navigator.clipboard) {
            navigator.clipboard.writeText(code).then(function () {
              btn.textContent = 'Copied!';
              btn.classList.add('copied');
              setTimeout(function () {
                btn.textContent = 'Copy';
                btn.classList.remove('copied');
              }, 1200);
            });
          }
        });
      });
    }

    filterRow.addEventListener('click', function (e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      filterRow.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.getAttribute('data-filter');
      render();
    });

    searchInput.addEventListener('input', render);

    render();
  </script>
</body>
</html>
